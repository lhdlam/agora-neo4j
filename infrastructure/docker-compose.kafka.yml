# ─────────────────────────────────────────────────────────────
# Kafka – KRaft mode (no Zookeeper)
#
# All values are controlled via .env — do NOT hardcode here.
# Start:  docker compose -f infrastructure/docker-compose.kafka.yml up -d
#         make up-kafka
#
# KRaft = Kafka Raft consensus, built-in since Kafka 2.8,
# production-ready since 3.3, default in Kafka 4.0.
#
# ⚠️  KAFKA_CLUSTER_ID is a fixed dev value.
# Generate a new one per deployment: kafka-storage random-uuid
# ─────────────────────────────────────────────────────────────

networks:
  agora-net:
    name: agora-net
    driver: bridge
    # Declared in all compose files so each file works standalone too.
    # Docker Compose deduplicates when running with multiple -f flags.

volumes:
  kafka-data:
  kafka-secrets:

services:
  kafka:
    image: confluentinc/cp-kafka:${KAFKA_IMAGE_TAG:?Set KAFKA_IMAGE_TAG in .env}
    restart: unless-stopped
    environment:
      # ── KRaft identity ─────────────────────────────────────
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: "${KAFKA_CLUSTER_ID:?Set KAFKA_CLUSTER_ID in .env}"

      # ── Listeners ──────────────────────────────────────────
      KAFKA_LISTENERS: >-
        PLAINTEXT://0.0.0.0:29092,
        PLAINTEXT_HOST://0.0.0.0:9092,
        CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: >-
        PLAINTEXT://kafka:29092,
        PLAINTEXT_HOST://localhost:${KAFKA_PORT:?Set KAFKA_PORT in .env}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT,
        CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # ── KRaft controller ────────────────────────────────────
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # ── Topic defaults ──────────────────────────────────────
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:?Set KAFKA_NUM_PARTITIONS in .env}
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
      - kafka-secrets:/etc/kafka/secrets
    ports:
      - "${KAFKA_PORT:?Set KAFKA_PORT in .env}:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: ${HEALTHCHECK_INTERVAL:-15s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-10}
    networks:
      - agora-net
